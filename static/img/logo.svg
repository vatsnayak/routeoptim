<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#grad1)" filter="url(#shadow)"/>
  <!-- Inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Route path (curved road) -->
  <path d="M 140 360 Q 180 280 220 300 Q 260 320 280 240 Q 300 160 360 180 Q 400 195 380 150"
        fill="none" stroke="white" stroke-opacity="0.3" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 140 360 Q 180 280 220 300 Q 260 320 280 240 Q 300 160 360 180 Q 400 195 380 150"
        fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="1 24" stroke-dashoffset="0"/>
  <!-- Location pin (destination) -->
  <g transform="translate(355, 90)">
    <path d="M 0 0 C -30 -5 -40 -35 -40 -52 C -40 -74 -22 -92 0 -92 C 22 -92 40 -74 40 -52 C 40 -35 30 -5 0 0 Z"
          fill="white" opacity="0.95"/>
    <circle cx="0" cy="-52" r="18" fill="url(#grad1)"/>
  </g>
  <!-- Start circle -->
  <circle cx="140" cy="360" r="22" fill="white" opacity="0.95"/>
  <circle cx="140" cy="360" r="12" fill="url(#grad2)"/>
  <!-- Waypoint dots -->
  <circle cx="250" cy="270" r="10" fill="white" opacity="0.7"/>
  <circle cx="320" cy="200" r="10" fill="white" opacity="0.7"/>
</svg>

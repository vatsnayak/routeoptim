{% extends 'base.html' %}
{% block title %}Live Map — RouteOptim{% endblock %}
{% block content %}
<div class="container-fluid px-4">
    <div class="page-header" data-aos="fade-down">
        <h2 class="page-title"><i class="bi bi-map-fill"></i> Live Map</h2>
        <div class="d-flex gap-2">
            <span class="badge rounded-pill" style="background:var(--primary-bg);color:var(--primary);padding:0.5rem 1rem;">
                <i class="bi bi-geo-alt-fill me-1"></i>Deliveries
            </span>
            <span class="badge rounded-pill" style="background:#ecfdf5;color:#059669;padding:0.5rem 1rem;">
                <i class="bi bi-truck-front-fill me-1"></i>Vehicles
            </span>
        </div>
    </div>
    <div class="card-modern" data-aos="fade-up">
        <div id="map" style="height: 600px; border-radius: var(--radius-lg);"></div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    .marker-delivery { background: var(--primary); border: 3px solid white; border-radius: 50%; width: 14px; height: 14px; box-shadow: 0 2px 8px rgba(99,102,241,0.5); }
    .marker-vehicle { background: #10b981; border: 3px solid white; border-radius: 50%; width: 16px; height: 16px; box-shadow: 0 2px 8px rgba(16,185,129,0.5); }
    .marker-transit { background: #3b82f6; border: 3px solid white; border-radius: 50%; width: 14px; height: 14px; animation: pulse-marker 2s infinite; box-shadow: 0 2px 8px rgba(59,130,246,0.5); }
    @keyframes pulse-marker { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 50% { box-shadow: 0 0 0 12px rgba(59,130,246,0); } }
    .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; }
    .leaflet-popup-content { margin: 12px 16px !important; font-family: 'Inter', sans-serif !important; }
    .popup-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .popup-info { color: #64748b; font-size: 0.8rem; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const markers = {{ markers_json|safe }};
    const map = L.map('map').setView([40.7484, -73.9967], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        maxZoom: 19
    }).addTo(map);

    const bounds = [];
    markers.forEach(function(m) {
        const pos = [m.lat, m.lng];
        bounds.push(pos);
        let cssClass, popup;

        if (m.type === 'vehicle') {
            cssClass = 'marker-vehicle';
            popup = `<div class="popup-title"><i class="bi bi-truck-front-fill" style="color:#10b981"></i> ${m.label}</div>
                     <div class="popup-info">${m.model}<br>Driver: ${m.driver}</div>`;
        } else {
            cssClass = m.status === 'in-transit' ? 'marker-transit' : 'marker-delivery';
            const statusColor = m.status === 'in-transit' ? '#3b82f6' : '#6366f1';
            popup = `<div class="popup-title"><i class="bi bi-box-seam-fill" style="color:${statusColor}"></i> ${m.label}</div>
                     <div class="popup-info">${m.customer}<br>${m.address}<br>
                     <span style="color:${statusColor};font-weight:600;">${m.status}</span></div>
                     <a href="/deliveries/${m.id}/" style="color:#6366f1;font-size:0.8rem;font-weight:600;text-decoration:none;">View Details →</a>`;
        }

        const icon = L.divIcon({ className: cssClass, iconSize: [14, 14] });
        L.marker(pos, { icon: icon }).addTo(map).bindPopup(popup);
    });

    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
});
</script>
{% endblock %}
